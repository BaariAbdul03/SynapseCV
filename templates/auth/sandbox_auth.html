<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox OAuth Authorization — SynapseCV</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060609;
            --surface-color: rgba(13, 13, 20, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #cbd5e0;
            --accent-primary: #6c5ce7;
            --accent-secondary: #00d2d3;
            --accent-warning: #ff9f43;
            --accent-glow: rgba(108, 92, 231, 0.15);
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 159, 67, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(108, 92, 231, 0.04) 0%, transparent 40%);
            color: #ffffff;
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        /* --- Glassmorphic Card --- */
        .auth-card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 460px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 159, 67, 0.05);
            animation: cardFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            text-align: center;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-warning), var(--accent-primary), transparent);
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-warning), var(--accent-primary));
            color: #ffffff;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(255, 159, 67, 0.25);
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }

        .auth-subtitle {
            font-size: 0.9rem;
            color: #a0aec0;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* --- Sandbox Badge Panel --- */
        .sandbox-panel {
            background: rgba(255, 159, 67, 0.04);
            border: 1px solid rgba(255, 159, 67, 0.15);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .panel-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
        }

        .panel-row:last-child {
            margin-bottom: 0;
        }

        .panel-label {
            color: #718096;
            font-weight: 600;
        }

        .panel-value {
            color: #ff9f43;
            font-family: monospace;
            font-weight: 600;
        }

        /* --- Actions --- */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-warning), #e67e22);
            border: none;
            color: #ffffff;
            border-radius: 12px;
            padding: 0.95rem;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 159, 67, 0.4);
            background: linear-gradient(135deg, #ffb15c, var(--accent-warning));
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .cancel-link {
            display: block;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #718096;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .cancel-link:hover {
            color: #cbd5e0;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        
        <div class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" fill="currentColor"/><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.64 5.64l2.83 2.83M15.53 15.53l2.83 2.83M5.64 18.36l2.83-2.83M15.53 8.47l2.83-2.83"/><circle cx="12" cy="3" r="1" fill="currentColor"/><circle cx="12" cy="21" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="21" cy="12" r="1" fill="currentColor"/></svg>
        </div>

        <h1 class="auth-title">OAuth Sandbox</h1>
        <p class="auth-subtitle">
            Google OAuth secrets are not configured in your local environment. You are about to sign in using simulated Developer Sandbox Mode.
        </p>

        <div class="sandbox-panel">
            <div class="panel-row">
                <span class="panel-label">MOCK EMAIL</span>
                <span class="panel-value">developer.sandbox@synapsecv.io</span>
            </div>
            <div class="panel-row">
                <span class="panel-label">MOCK NAME</span>
                <span class="panel-value">Sandbox Recruiter</span>
            </div>
            <div class="panel-row">
                <span class="panel-label">AUTH PROVIDER</span>
                <span class="panel-value">Google (Simulated)</span>
            </div>
        </div>

        <form action="{{ url_for('auth.google_sandbox_callback') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="submit-btn" type="submit">
                <span>Authorize Sandbox Session</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </form>

        <a href="{{ url_for('auth.login') }}" class="cancel-link">Return to Sign In</a>

    </div>

</body>
</html>
